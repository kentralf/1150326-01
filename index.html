<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>母親節幸運占卜</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <div class="hero-text">
        <h1>母親節幸運占卜</h1>
        <p>抽一張溫暖祝福卡，看看媽媽和你的愛心能量有多滿滿！</p>
      </div>
      <div class="hero-icon">🌸</div>
    </header>

    <section class="game-card">
      <div class="fortune-panel" id="fortunePanel">
        <div class="fortune-title">準備好抽卡吧</div>
        <div class="fortune-message">點擊下方按鈕，讓幸福祝福飛向媽媽！</div>
      </div>

      <button id="drawButton" class="draw-button">抽一張祝福卡</button>
    </section>

    <section class="tips">
      <h2>小提醒</h2>
      <p>送給媽媽的溫柔話語，勝過任何占卜結果。記得用簡單一句「我愛你」讓她今天更幸福。</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
